<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>0Fluff Pocket</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" id="metaThemeColor" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <link rel="stylesheet" href="0flufThemes.css" />
    <link rel="stylesheet" href="core.css" />
    <link rel="stylesheet" href="modules.css" />
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body class="dark material">
    <div id="bgOverlay" class="bg-overlay"></div>

    <div class="app-container">
      <header class="at-a-glance">
        <div id="clockDisplay" class="clock">00:00:00</div>
        <div id="greetingDisplay" class="greeting">Hello, User.</div>
      </header>

      <main id="linkGrid" class="mobile-grid"></main>

      <div id="searchPopup" class="search-popup hidden">
        <div class="search-bar">
          <div class="engine-switcher" id="engineSwitcher">
            <button class="engine-btn" id="engineDropdownBtn">
              <span id="currentEngineIcon">G</span>
            </button>
            <div id="engineDropdown" class="engine-dropdown hidden"></div>
          </div>

          <input
            type="text"
            id="searchInput"
            placeholder="Search or Type URL..."
            autocomplete="off"
          />

          <button class="search-icon" id="searchSubmitBtn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>

          <div
            id="suggestionsContainer"
            class="suggestions-container hidden"
          ></div>
        </div>
      </div>
    </div>

    <nav id="bottomDock" class="bottom-dock">
      <button id="dockSettingsBtn" class="dock-btn" aria-label="Settings">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
          ></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>

      <button
        id="dockSearchBtn"
        class="dock-btn active-fab"
        aria-label="Search"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>

      <button id="dockBackBtn" class="dock-btn hidden" aria-label="Back">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
    </nav>

    <script src="state.js"></script>
    <script src="utilities.js"></script>
    <script src="ui-logic.js"></script>
  </body>
</html>
